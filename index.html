<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AYS Rentals | Order Form</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --primary: #1a1a2e;
  --accent: #e94560;
  --blue: #0f3460;
  --bg: #f5f6fa;
  --white: #ffffff;
  --gray: #6b7280;
  --radius: 12px;
  --shadow: 0 4px 20px rgba(0,0,0,0.08);
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--primary);
  line-height: 1.6;
  min-height: 100vh;
}

/* HEADER */
.header {
  background: var(--primary);
  color: var(--white);
  padding: 20px 24px;
  text-align: center;
}
.header h1 {
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 1px;
}
.header p {
  font-size: 14px;
  opacity: 0.7;
  margin-top: 4px;
}

/* FORM CONTAINER */
.form-container {
  max-width: 720px;
  margin: 32px auto;
  padding: 0 20px;
}

.form-card {
  background: var(--white);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
  padding: 32px;
  margin-bottom: 24px;
}

.form-card h2 {
  font-size: 18px;
  font-weight: 600;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--bg);
}

/* FORM FIELDS */
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 16px;
}
.form-row.full { grid-template-columns: 1fr; }

.form-group {
  display: flex;
  flex-direction: column;
}

.form-group label {
  font-size: 13px;
  font-weight: 600;
  color: var(--gray);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
}

.form-group input,
.form-group select,
.form-group textarea {
  padding: 10px 14px;
  border: 1.5px solid #e0e0e0;
  border-radius: 8px;
  font-size: 15px;
  font-family: inherit;
  color: var(--primary);
  background: var(--white);
  transition: border-color 0.2s;
  outline: none;
}
.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus {
  border-color: var(--accent);
}
.form-group textarea { resize: vertical; min-height: 80px; }

/* RENTAL ITEMS TABLE */
.items-table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 12px;
}
.items-table th {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--gray);
  text-align: left;
  padding: 8px 10px;
  border-bottom: 2px solid var(--bg);
}
.items-table td {
  padding: 8px 10px;
  border-bottom: 1px solid #f0f0f0;
  vertical-align: middle;
}
.items-table input,
.items-table select {
  width: 100%;
  padding: 8px 10px;
  border: 1.5px solid #e0e0e0;
  border-radius: 6px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
}
.items-table input:focus,
.items-table select:focus {
  border-color: var(--accent);
}

.add-item-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  margin-top: 12px;
  padding: 8px 16px;
  background: var(--bg);
  border: 1.5px dashed #ccc;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  color: var(--gray);
  cursor: pointer;
  transition: all 0.2s;
}
.add-item-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
}

.remove-btn {
  background: none;
  border: none;
  color: #ccc;
  font-size: 20px;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  transition: color 0.2s;
}
.remove-btn:hover { color: var(--accent); }

/* TOTALS */
.totals-section {
  margin-top: 20px;
  padding-top: 16px;
  border-top: 2px solid var(--bg);
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.total-row {
  display: flex;
  justify-content: space-between;
  width: 260px;
  font-size: 15px;
}
.total-row.grand {
  font-size: 18px;
  font-weight: 700;
  padding-top: 8px;
  border-top: 2px solid var(--primary);
}

/* SUBMIT */
.submit-btn {
  display: block;
  width: 100%;
  padding: 16px 32px;
  background: var(--accent);
  color: var(--white);
  border: none;
  border-radius: var(--radius);
  font-size: 16px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  box-shadow: 0 4px 16px rgba(233,69,96,0.3);
}
.submit-btn:hover {
  background: #d63851;
  transform: translateY(-1px);
  box-shadow: 0 6px 24px rgba(233,69,96,0.4);
}

.footer {
  text-align: center;
  padding: 24px;
  font-size: 13px;
  color: var(--gray);
}

/* RESPONSIVE */
@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  .form-card { padding: 20px; }
  .items-table { font-size: 13px; }
  .total-row { width: 100%; }
  .totals-section { align-items: stretch; }
}
</style>
</head>
<body>

<div class="header">
  <h1>AYS Rentals</h1>
  <p>Equipment & Rental Order Form</p>
</div>

<div class="form-container">
  <form id="orderForm">

    <!-- CUSTOMER INFO -->
    <div class="form-card">
      <h2>Customer Information</h2>
      <div class="form-row">
        <div class="form-group">
          <label>First Name *</label>
          <input type="text" name="firstName" required>
        </div>
        <div class="form-group">
          <label>Last Name *</label>
          <input type="text" name="lastName" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Email *</label>
          <input type="email" name="email" required>
        </div>
        <div class="form-group">
          <label>Phone *</label>
          <input type="tel" name="phone" required>
        </div>
      </div>
      <div class="form-row full">
        <div class="form-group">
          <label>Company / Organization</label>
          <input type="text" name="company">
        </div>
      </div>
    </div>

    <!-- DELIVERY INFO -->
    <div class="form-card">
      <h2>Delivery Details</h2>
      <div class="form-row full">
        <div class="form-group">
          <label>Delivery Address *</label>
          <input type="text" name="address" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>City *</label>
          <input type="text" name="city" required>
        </div>
        <div class="form-group">
          <label>State *</label>
          <input type="text" name="state" value="OK" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Rental Start Date *</label>
          <input type="date" name="startDate" required>
        </div>
        <div class="form-group">
          <label>Rental End Date *</label>
          <input type="date" name="endDate" required>
        </div>
      </div>
    </div>

    <!-- RENTAL ITEMS -->
    <div class="form-card">
      <h2>Rental Items</h2>
      <table class="items-table">
        <thead>
          <tr>
            <th>Item / Equipment</th>
            <th style="width:80px">Qty</th>
            <th style="width:120px">Rate</th>
            <th style="width:100px">Subtotal</th>
            <th style="width:40px"></th>
          </tr>
        </thead>
        <tbody id="itemsBody">
          <tr class="item-row">
            <td><input type="text" name="itemName[]" placeholder="e.g. Dumpster, Porta Potty"></td>
            <td><input type="number" name="itemQty[]" value="1" min="1" onchange="calcTotals()"></td>
            <td><input type="number" name="itemRate[]" step="0.01" placeholder="0.00" onchange="calcTotals()"></td>
            <td class="row-subtotal">$0.00</td>
            <td><button type="button" class="remove-btn" onclick="removeRow(this)">&times;</button></td>
          </tr>
        </tbody>
      </table>
      <button type="button" class="add-item-btn" onclick="addRow()">+ Add Item</button>

      <div class="totals-section">
        <div class="total-row">
          <span>Subtotal</span>
          <span id="subtotal">$0.00</span>
        </div>
        <div class="total-row">
          <span>Tax (0%)</span>
          <span id="tax">$0.00</span>
        </div>
        <div class="total-row">
          <span>Delivery Fee</span>
          <span id="delivery">$0.00</span>
        </div>
        <div class="total-row grand">
          <span>Total</span>
          <span id="grandTotal">$0.00</span>
        </div>
      </div>
    </div>

    <!-- NOTES -->
    <div class="form-card">
      <h2>Additional Notes</h2>
      <div class="form-row full">
        <div class="form-group">
          <label>Special Instructions or Notes</label>
          <textarea name="notes" placeholder="Any special delivery instructions, site access details, etc."></textarea>
        </div>
      </div>
    </div>

    <button type="submit" class="submit-btn">Submit Order</button>
  </form>
</div>

<div class="footer">
  &copy; 2026 AYS Rentals. All rights reserved.
</div>

<script>
function addRow() {
  const tbody = document.getElementById('itemsBody');
  const row = document.createElement('tr');
  row.className = 'item-row';
  row.innerHTML = `
    <td><input type="text" name="itemName[]" placeholder="e.g. Dumpster, Porta Potty"></td>
    <td><input type="number" name="itemQty[]" value="1" min="1" onchange="calcTotals()"></td>
    <td><input type="number" name="itemRate[]" step="0.01" placeholder="0.00" onchange="calcTotals()"></td>
    <td class="row-subtotal">$0.00</td>
    <td><button type="button" class="remove-btn" onclick="removeRow(this)">&times;</button></td>
  `;
  tbody.appendChild(row);
}

function removeRow(btn) {
  const rows = document.querySelectorAll('.item-row');
  if (rows.length > 1) {
    btn.closest('tr').remove();
    calcTotals();
  }
}

function calcTotals() {
  const rows = document.querySelectorAll('.item-row');
  let subtotal = 0;
  rows.forEach(row => {
    const qty = parseFloat(row.querySelector('[name="itemQty[]"]').value) || 0;
    const rate = parseFloat(row.querySelector('[name="itemRate[]"]').value) || 0;
    const rowTotal = qty * rate;
    row.querySelector('.row-subtotal').textContent = '$' + rowTotal.toFixed(2);
    subtotal += rowTotal;
  });
  document.getElementById('subtotal').textContent = '$' + subtotal.toFixed(2);
  document.getElementById('grandTotal').textContent = '$' + subtotal.toFixed(2);
}

document.getElementById('orderForm').addEventListener('submit', function(e) {
  e.preventDefault();
  alert('Order submitted! (Connect to your backend or email service to process.)');
});
</script>
</body>
</html>
